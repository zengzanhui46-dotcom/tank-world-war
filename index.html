<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>坦克世界大战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── 主布局：竖排 flex ── */
    #app {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
    }

    /* ── 上半：游戏画面区 ── */
    #game-area {
      flex: 1 1 auto;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      min-height: 0;
    }
    #game-area canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* ── 下半：控制栏 ── */
    #control-bar {
      flex: 0 0 auto;
      width: 100%;
      background: #111;
      border-top: 2px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      gap: 12px;
      min-height: 150px;
    }

    /* ── 方向摇杆 ── */
    .dpad {
      display: grid;
      grid-template-columns: 70px 70px 70px;
      grid-template-rows: 70px 70px 70px;
      gap: 4px;
      flex-shrink: 0;
    }
    .dpad-btn {
      width: 70px; height: 70px;
      background: #2a2a2a;
      border: 2px solid #555;
      border-radius: 12px;
      color: #ccc;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .dpad-btn:active, .dpad-btn.pressed {
      background: #4caf50;
      border-color: #81c784;
      color: #fff;
    }
    .dpad-empty { background: transparent; border: none; }

    /* ── 中间信息 ── */
    #info-panel {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      color: #ccc;
      font-family: monospace;
      font-size: 13px;
      text-align: center;
      min-width: 0;
    }
    #info-panel .lives { color: #4caf50; font-size: 15px; }
    #info-panel .enemies { color: #ff9800; font-size: 13px; }

    /* ── 开火按钮 ── */
    #fire-btn {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, #e53935 40%, #b71c1c 100%);
      border: 4px solid #ff5252;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      text-shadow: 0 2px 4px #000;
      box-shadow: 0 0 20px rgba(255,0,0,0.3);
    }
    #fire-btn:active, #fire-btn.pressed {
      background: radial-gradient(circle, #ff5252 40%, #d32f2f 100%);
      border-color: #ff8a80;
      box-shadow: 0 0 40px rgba(255,0,0,0.6);
      transform: scale(0.95);
    }

    /* ── 暂停按钮 ── */
    #pause-btn {
      position: fixed;
      top: 8px; right: 8px;
      z-index: 100;
      background: rgba(0,0,0,0.6);
      border: 1px solid #555;
      color: #ffaa00;
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: monospace;
      touch-action: manipulation;
    }

    /* ── 桌面端：缩小控制栏 ── */
    @media (min-width: 768px) {
      #control-bar { display: none; }
      #pause-btn { top: 4px; right: 4px; font-size: 12px; padding: 4px 8px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 游戏画面区 -->
    <div id="game-area"></div>

    <!-- 控制栏（手机可见） -->
    <div id="control-bar">
      <!-- 方向键 -->
      <div class="dpad" id="dpad">
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-dir="up">▲</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-dir="left">◀</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-dir="right">▶</button>
        <div class="dpad-empty"></div>
        <button class="dpad-btn" data-dir="down">▼</button>
        <div class="dpad-empty"></div>
      </div>

      <!-- 中间信息 -->
      <div id="info-panel">
        <div class="lives" id="hud-lives">❤ x3 HP:3</div>
        <div class="enemies" id="hud-enemies">🎯 0/0</div>
        <div id="hud-powerups" style="color:#ffd700;font-size:11px;"></div>
        <div id="hud-level" style="color:#888;font-size:11px;"></div>
      </div>

      <!-- 开火 -->
      <button id="fire-btn">开火</button>
    </div>

    <!-- 暂停 -->
    <button id="pause-btn" style="display:none;">⏸ 暂停</button>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
